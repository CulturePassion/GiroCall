name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/deploy.yml'

jobs:
  supabase:
    runs-on: ubuntu-latest
    if: github.repository == 'cultureos/GiroCall' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'gtvpsukmmjhszpopulfe' }}
        run: node scripts/apply_migrations.mjs

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF || 'gtvpsukmmjhszpopulfe' }}" --yes
          supabase functions deploy daily-reminder --no-verify-jwt
          supabase functions deploy wallet-pass --no-verify-jwt

      - name: Verify Supabase health
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'gtvpsukmmjhszpopulfe' }}
        run: node scripts/verify_supabase.mjs