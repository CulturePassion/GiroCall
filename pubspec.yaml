name: girocall
description: "Spin the Giro. Make the Call. Stay Connected."
publish_to: 'none'
version: 2.0.0+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.15.0

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # Network & observability
  connectivity_plus: ^6.1.4
  sentry_flutter: ^8.14.2

  # Contacts & permissions
  flutter_contacts: ^2.2.2
  permission_handler: ^12.0.3

  # Calling
  url_launcher: ^6.2.5

  # Notifications
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  firebase_messaging: ^16.3.0
  firebase_core: ^4.10.0

  # Charts
  fl_chart: ^1.2.0

  # UI utilities
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  share_plus: ^13.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.1.2
  logging: ^1.3.0
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#00ADEF"
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
